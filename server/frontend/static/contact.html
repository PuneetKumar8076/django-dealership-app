<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        nav {
            background: #2c3e50;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a.active {
            color: yellow;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>
</head>

<body>

<nav>
    <a href="About.html">About</a>
    <a href="Contact.html" class="active">Contact Us</a>
</nav>

<div class="container">

    <h1>📞 Contact Us</h1>

    <div class="card">
        <h3>Our Office</h3>
        <p>📍 Mumbai, India</p>
        <p>📧 email: support@dealership.com</p>
        <p>📞 Phone: +91 9876543210</p>
    </div>

    <div class="card">
        <h3>Send Message</h3>

        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Your Message"></textarea>

        <button>Send</button>
    </div>

</div>

</body>
</html>
