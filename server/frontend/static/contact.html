<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <!-- ✅ REQUIRED CSS LINKS -->
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ✅ NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Dealership</a>

            <div>
                <a href="About.html" class="nav-link text-white">About</a>
                <a href="Contact.html" class="nav-link text-warning active">Contact Us</a>
            </div>
        </div>
    </nav>

    <!-- ✅ CONTENT -->
    <div class="container mt-5 text-center">

        <h1>📞 Contact Us</h1>

        <!-- ✅ IMAGE (IMPORTANT) -->
        <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216"
             alt="Contact"
             class="img-fluid mb-4"
             style="max-width: 400px;">

        <!-- CONTACT INFO -->
        <div class="card p-3 mb-4">
            <h3>Our Office</h3>
            <p>📍 Mumbai, India</p>
            <p>📧 support@dealership.com</p>
            <p>📞 +91 9876543210</p>
        </div>

        <!-- FORM -->
        <div class="card p-3">
            <h3>Send Message</h3>

            <input type="text" class="form-control" placeholder="Your Name">
            <input type="email" class="form-control mt-2" placeholder="Your Email">
            <textarea class="form-control mt-2" placeholder="Your Message"></textarea>

            <button class="btn btn-dark mt-3">Send</button>
        </div>

    </div>

</body>
</html>
