<!DOCTYPE html>
<html>
<head>
    <title>Post Review</title>
</head>
<body>

<h1>Post Review</h1>

<form method="POST">
    {% csrf_token %}

    <label>Dealer ID:</label><br>
    <input type="text" value="{{ dealer_id }}" readonly><br><br>

    <label>Review:</label><br>
    <textarea name="review" rows="4" cols="40" placeholder="Write your review here"></textarea><br><br>

    <label>Rating:</label><br>
    <select name="rating">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select><br><br>

    <button type="submit">Submit Review</button>
</form>

</body>
</html>
